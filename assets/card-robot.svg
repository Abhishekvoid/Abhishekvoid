  <!-- flow -->
  <g font-size="12.5" fill="#79c0ff" text-anchor="middle">
    <rect x="44"  y="150" width="170" height="46" rx="6" fill="#0d1420" stroke="#1f6feb"/>
    <text x="129" y="170">SENSORS</text>
    <text x="129" y="186" fill="#484f58">YOLOv8 · LiDAR · UWB</text>

    <rect x="264" y="150" width="140" height="46" rx="6" fill="#0d1420" stroke="#1f6feb"/>
    <text x="334" y="170">ROS2</text>
    <text x="334" y="186" fill="#484f58">sensor fusion</text>

    <rect x="454" y="150" width="150" height="46" rx="6" fill="#0d1420" stroke="#1f6feb"/>
    <text x="529" y="170">DJANGO</text>
    <text x="529" y="186" fill="#484f58">orchestration</text>

    <rect x="654" y="150" width="150" height="46" rx="6" fill="#0d1420" stroke="#1f6feb"/>
    <text x="729" y="170">MODBUS TCP</text>
    <text x="729" y="186" fill="#484f58">direct control</text>

    <rect x="854" y="150" width="150" height="46" rx="6" fill="#0d1420" stroke="#1f6feb"/>
    <text x="929" y="170">PLC / DRIVES</text>
    <text x="929" y="186" fill="#484f58">actuation</text>
  </g>

  <!-- arrows -->
  <g stroke="#30363d" stroke-width="1.5">
    <line x1="214" y1="173" x2="264" y2="173"/>
    <line x1="404" y1="173" x2="454" y2="173"/>
    <line x1="604" y1="173" x2="654" y2="173"/>
    <line x1="804" y1="173" x2="854" y2="173"/>
  </g>
  <g fill="#30363d">
    <path d="M258 169l8 4-8 4z"/><path d="M448 169l8 4-8 4z"/>
    <path d="M648 169l8 4-8 4z"/><path d="M848 169l8 4-8 4z"/>
  </g>

  <!-- ws branch -->
  <text x="529" y="218" text-anchor="middle" font-size="11.5" fill="#484f58">▲▼ websockets ~60ms · HMI (react) · redis state reconciliation</text>

  <!-- animated data pulse -->
  <circle r="3.5" fill="#ffa657">
    <animateMotion path="M44 173 H1004" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.9;1" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- stack chips -->
  <g font-size="12" fill="#8b949e">
    <text x="44" y="264">django</text><text x="112" y="264">ros2</text><text x="158" y="264">websockets</text>
    <text x="254" y="264">modbus-tcp</text><text x="352" y="264">opencv</text><text x="418" y="264">redis</text>
    <text x="1056" y="264" text-anchor="end" fill="#3fb950">● 1.5y in production · zero safety incidents</text>
  </g>
