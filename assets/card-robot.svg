<svg width="1100" height="300" viewBox="0 0 1100 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,'Cascadia Mono','SF Mono',Menlo,Consolas,monospace">
  <rect x="1.5" y="1.5" width="1097" height="297" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

  <!-- corner ticks -->
  <g stroke="#30363d" stroke-width="1.5" fill="none">
    <path d="M18 32V18H32"/><path d="M1068 18H1082V32"/>
    <path d="M18 268V282H32"/><path d="M1082 268V282H1068"/>
  </g>

  <!-- header -->
  <text x="44" y="52" font-size="13" fill="#484f58">SYS.01</text>
  <text x="110" y="52" font-size="20" font-weight="700" letter-spacing="1.5" fill="#e6edf3">AUTONOMOUS ROBOT CONTROL</text>
  <g>
    <rect x="44" y="66" width="360" height="22" rx="4" fill="#1c1408" stroke="#9e6a03"/>
    <text x="54" y="81" font-size="12" fill="#d29922">▓ DEFENSE SYSTEM — VISUALS RESTRICTED</text>
  </g>

