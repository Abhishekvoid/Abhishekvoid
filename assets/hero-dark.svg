<svg width="1100" height="260" viewBox="0 0 1100 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" fill="none" stroke="#141b24" stroke-width="1"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="260" fill="#0d1117"/>
  <rect width="1100" height="260" fill="url(#grid)"/>

  <!-- blueprint corner registration marks -->
  <g stroke="#30363d" stroke-width="1.5" fill="none">
    <path d="M14 34V14H34"/>
    <path d="M1066 14H1086V34"/>
    <path d="M14 226V246H34"/>
    <path d="M1086 226V246H1066"/>
  </g>

  <!-- top annotation row -->
  <g font-family="ui-monospace,'Cascadia Mono','SF Mono',Menlo,Consolas,monospace" font-size="12" fill="#484f58">
    <text x="46" y="36">// profile.readme — rev 2.0</text>
    <text x="1054" y="36" text-anchor="end">AHMEDABAD, IN · UTC+05:30</text>
  </g>

  <!-- name -->
  <text x="46" y="118" font-family="ui-monospace,'Cascadia Mono','SF Mono',Menlo,Consolas,monospace"
        font-size="52" font-weight="700" letter-spacing="2" fill="#e6edf3">ABHISHEK RAJPUT</text>

  <!-- measurement underline -->
  <g stroke="#ffa657" stroke-width="1.5">
    <line x1="46" y1="134" x2="560" y2="134"/>
    <line x1="46" y1="129" x2="46" y2="139"/>
    <line x1="560" y1="129" x2="560" y2="139"/>
  </g>

  <!-- role line -->
  <text x="46" y="168" font-family="ui-monospace,'Cascadia Mono','SF Mono',Menlo,Consolas,monospace"
        font-size="17" letter-spacing="3" fill="#79c0ff">BACKEND · ROBOTICS · AI SYSTEMS</text>

  <!-- cycling metric line -->
  <g font-family="ui-monospace,'Cascadia Mono','SF Mono',Menlo,Consolas,monospace" font-size="16">
    <text x="46" y="212" fill="#484f58">&gt;</text>
    <g fill="#ffa657">
      <text x="66" y="212" opacity="0">robot control loops at 150ms — down from 500ms
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.30;0.33;1" dur="9s" begin="0s" repeatCount="indefinite"/>
      </text>
      <text x="66" y="212" opacity="0">RAG answers in 1.5–2s, end to end, in production
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.30;0.33;1" dur="9s" begin="3s" repeatCount="indefinite"/>
      </text>
      <text x="66" y="212" opacity="0">60,000 sensor tags · 500+ users · 20+ facilities
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.02;0.30;0.33;1" dur="9s" begin="6s" repeatCount="indefinite"/>
      </text>
    </g>
    <!-- blinking cursor -->
    <rect x="620" y="199" width="9" height="16" fill="#ffa657">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect width="1100" height="18" fill="url(#fade)"/>
</svg>
